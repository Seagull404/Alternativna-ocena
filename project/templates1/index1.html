<!DOCTYPE html>
<html lang="en">
<head>
    <title>Zapiski</title>
</head>
<body>
    <h1>Zapiski:</h1>
    {% for note in notes %}
    <h3>{{ note.title }}</h3>
    <p>{{ note.content }}</p>
    <form action="/edit/{{ note.id }}" method="post" style="display:inline;">
        <button type="submit">Uredi</button>
    </form>
    <form action="/delete/{{ note.id }}" method="post" style="display:inline;">
        <button type="submit">Počisti</button>
    </form>
    <hr>
    {% endfor %}

    <h2>Dodaj nov zapisek</h2>
    <form action="/add" method="post">
        <input type="text" name="title" placeholder="Naslov" required><br>
        <textarea name="content" placeholder="Vsebina" required></textarea><br>
        <button type="submit">Shrani</button>
    </form>
</body>
</html>
